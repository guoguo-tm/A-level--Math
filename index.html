<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-Level Maths Lab</title>
<link rel="stylesheet" href="css/style.css">
<!-- KaTeX for math rendering -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>

<!-- ====== HEADER ====== -->
<header class="header">
  <div class="header-left">
    <h1 id="app-title" data-i18n="appTitle">📐 A-Level Maths Lab</h1>
    <div class="subtitle" id="app-subtitle" data-i18n="subTitle">Auto-generate · Visualise · AI Tutor</div>
  </div>
  <div class="header-right">
    <button class="btn-icon" id="btn-lang" title="Switch Language" data-i18n-title="toggleEn">🌐</button>
    <button class="btn-icon" id="btn-settings" title="Settings" data-i18n-title="settingsTitle">⚙️</button>
  </div>
</header>

<!-- ====== TAB NAVIGATION ====== -->
<nav class="tab-nav">
  <button class="tab-btn active" id="tab-practice" data-i18n="tabPractice">Practice</button>
  <button class="tab-btn" id="tab-explore" data-i18n="tabExplore">Visual Explorer</button>
  <button class="tab-btn" id="tab-stats" data-i18n="tabStats">Statistics</button>
</nav>

<!-- ====== TOPIC SELECTOR BAR ====== -->
<div class="topic-bar" id="topic-bar">
  <label data-i18n="topicLabel">Topic:</label>
  <!-- Topic pills inserted dynamically -->
  <select class="difficulty-select" id="difficulty-select">
    <option value="easy" data-i18n="difficultyEasy">Easy</option>
    <option value="medium" selected data-i18n="difficultyMedium">Medium</option>
    <option value="hard" data-i18n="difficultyHard">Hard</option>
  </select>
  <button class="btn-secondary" id="btn-new-question" data-i18n="newQuestion">New Question</button>
</div>

<!-- ====== MAIN CONTENT ====== -->
<div class="main-container" id="panel-practice">
  <!-- LEFT: Question Panel -->
  <div class="panel" id="question-panel">
    <div class="panel-title" data-i18n="tabPractice">PRACTICE</div>
    <div class="question-header">
      <div class="question-meta">
        <span class="topic-badge" id="topic-badge">Algebra</span>
        <span class="difficulty-badge medium" id="difficulty-badge">Medium</span>
      </div>
    </div>
    <div class="question-body" id="question-body">
      Select a topic and click "New Question" to start.
    </div>
    <button class="btn-hint" id="btn-hint" data-i18n="showHint">💡 Hint</button>
    <div class="hidden text-muted" id="hint-text"></div>
  </div>

  <!-- CENTER: Visualization Panel -->
  <div class="panel" id="viz-panel">
    <div class="panel-title" data-i18n="tabExplore">VISUALISATION</div>
    <div class="viz-container" id="viz-container">
      <canvas id="viz-canvas"></canvas>
      <div class="viz-placeholder" id="viz-placeholder">
        Select a question to view visualisation
      </div>
    </div>
    <div class="viz-controls" id="viz-controls">
    </div>
    <div class="param-sliders" id="param-sliders">
    </div>
  </div>

  <!-- RIGHT: Answer Panel -->
  <div class="panel" id="answer-panel">
    <div class="panel-title" data-i18n="submit">ANSWER</div>
    <div class="answer-input-group">
      <input type="text" id="answer-input" data-i18n="answerPlaceholder" placeholder="Enter your answer...">
      <button class="btn-primary" id="btn-submit" data-i18n="submit">Submit</button>
    </div>
    <div class="answer-feedback hidden" id="answer-feedback"></div>
    <div class="text-muted hidden" id="correct-answer-display"></div>
    <div class="solution-box hidden" id="solution-box"></div>
    <div class="btn-group">
      <button class="btn-secondary hidden" id="btn-continue" data-i18n="continue">Continue</button>
      <button class="btn-secondary hidden" id="btn-retry" data-i18n="retry">Retry</button>
    </div>
  </div>
</div>

<!-- ====== STATS PANEL (hidden by default) ====== -->
<div class="main-container hidden" id="panel-stats">
  <div class="panel" style="grid-column: 1 / -1;">
    <div class="panel-title" data-i18n="statsTitle">LEARNING STATISTICS</div>
    <div class="stats-grid" id="stats-grid"></div>
    <div style="margin-top: 20px;">
      <h3 style="margin-bottom: 12px; font-size: 0.9rem;" data-i18n="statsByTopic">By Topic</h3>
      <div class="topic-stats-list" id="topic-stats-list"></div>
    </div>
  </div>
</div>

<!-- ====== FOOTER ====== -->
<div class="footer-bar">
  <span id="footer-accuracy">Accuracy: 0%</span>
  <span id="footer-total">Total: 0</span>
  <span id="footer-streak">🔥 0</span>
</div>

<!-- ====== AI FLOATING BUTTON ====== -->
<button class="ai-float-btn" id="ai-float-btn" title="AI Assistant">💬</button>

<!-- ====== AI DRAWER ====== -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="ai-drawer" id="ai-drawer">
  <div class="drawer-header">
    <h3 data-i18n="aiTitle">🤖 AI Assistant</h3>
    <button class="drawer-close" id="drawer-close">✕</button>
  </div>
  <div class="drawer-messages" id="drawer-messages"></div>
  <div class="drawer-input-area">
    <textarea id="drawer-input" data-i18n="aiPlaceholder" placeholder="Ask me anything..." rows="2"></textarea>
    <button id="drawer-send" data-i18n="aiSend">Send</button>
  </div>
</div>

<!-- ====== SETTINGS MODAL ====== -->
<div class="modal-overlay" id="settings-overlay">
  <div class="modal">
    <h3 data-i18n="settingsTitle">⚙️ Settings</h3>
    <div class="form-group">
      <label data-i18n="settingsLanguage">Language</label>
      <select id="settings-language">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </div>
    <div class="form-group">
      <label data-i18n="settingsExamBoard">Exam Board</label>
      <select id="settings-exam-board">
        <option value="Edexcel">Edexcel</option>
        <option value="AQA">AQA</option>
        <option value="OCR">OCR</option>
      </select>
    </div>
    <div class="form-group">
      <label data-i18n="settingsApiKey">API Key</label>
      <input type="password" id="settings-api-key" placeholder="sk-...">
    </div>
    <div class="form-group">
      <label data-i18n="settingsModel">Model</label>
      <select id="settings-model"></select>
    </div>
    <div class="form-group">
      <label data-i18n="settingsBaseUrl">API Base URL</label>
      <input type="text" id="settings-base-url" placeholder="https://shaobianer.com">
    </div>
    <div class="form-group">
      <label>
        <input type="checkbox" id="settings-dark-mode">
        <span data-i18n="settingsDarkMode">Dark Mode</span>
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" id="settings-save" data-i18n="settingsSave">Save</button>
      <button class="btn-secondary" id="settings-close" data-i18n="close">Close</button>
    </div>
  </div>
</div>

<!-- ====== SCRIPTS (load order matters!) ====== -->
<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/mathViz.js"></script>
<script src="js/statsManager.js"></script>
<script src="js/gradingEngine.js"></script>

<!-- Topic generators -->
<script src="js/topics/algebra.js"></script>
<script src="js/topics/calculus.js"></script>
<script src="js/topics/trigo.js"></script>
<script src="js/topics/sequences.js"></script>
<script src="js/topics/exponentials.js"></script>
<script src="js/topics/vectors.js"></script>
<script src="js/topics/statistics.js"></script>
<script src="js/topics/mechanics.js"></script>

<!-- Core modules -->
<script src="js/questionGenerator.js"></script>
<script src="js/visualizers/vizManager.js"></script>
<script src="js/aiAssistant.js"></script>
<script src="js/uiController.js"></script>

<!-- App bootstrap -->
<script src="js/app.js"></script>

</body>
</html>
